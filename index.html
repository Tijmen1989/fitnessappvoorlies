<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1B4F72">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Trainingsschema Lisanne</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ==================== TOP BAR ==================== -->
<div class="topbar" id="topbar">
  <h1>Hoi Lisanne <span class="week-badge" id="weekBadge">Week A</span></h1>
  <div class="subtitle" id="topbarDate"></div>
</div>

<!-- ==================== WELCOME BANNER ==================== -->
<div class="welcome-banner" id="welcomeBanner">
  <span>Welkom terug! Fijn dat je er bent.</span>
  <button class="close-btn" onclick="closeBanner()">&times;</button>
</div>

<!-- ==================== TODAY PAGE ==================== -->
<div class="page active" id="pageTrain">
  <div id="todayContent"></div>
</div>

<!-- ==================== AGENDA PAGE ==================== -->
<div class="page" id="pageAgenda">
  <div id="agendaContent"></div>
</div>

<!-- ==================== HISTORY / PROGRESS PAGE ==================== -->
<div class="page" id="pageHistory"></div>
<!-- ==================== PROFILE / SETTINGS PAGE ==================== -->
<div class="page" id="pageProfile"></div>

<!-- ==================== TRAINING MODE (fullscreen overlay) ==================== -->
<div class="training-mode" id="trainingMode">
  <div class="tm-header" id="tmHeader">
    <h2>Training</h2>
    <button class="tm-pause" onclick="pauseTraining()">Pauze</button>
    <button class="tm-close" onclick="confirmExitTraining()">Stoppen</button>
  </div>
  <div class="tm-progress"><div class="tm-progress-bar" id="tmProgressBar" style="width:0%"></div></div>
  <div class="tm-body" id="tmBody"></div>
</div>

<!-- ==================== DAY PREVIEW OVERLAY ==================== -->
<div class="day-preview-overlay" id="dayPreviewOverlay">
  <div class="dp-header">
    <button class="dp-back" onclick="closeDayPreview()">&larr; Terug</button>
    <h2 id="dpTitle">Training</h2>
  </div>
  <div class="dp-body" id="dpBody"></div>
</div>

<!-- ==================== VRIJE TRAINING MODAL ==================== -->
<div class="modal-overlay" id="vrijModal">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Vrije training kiezen</div>
    <div id="vrijOptions"></div>
    <div class="modal-option" onclick="closeModal()" style="text-align:center; color: var(--text-light);">
      <div class="opt-title">Toch niet</div>
    </div>
  </div>
</div>

<!-- ==================== BOTTOM NAV ==================== -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-item active" onclick="showPage('pageTrain', this)">
    <span class="nav-icon">&#127939;</span>
    Vandaag
  </button>
  <button class="nav-item" onclick="showPage('pageAgenda', this)">
    <span class="nav-icon">&#128197;</span>
    Planning
  </button>
  <button class="nav-item" onclick="showPage('pageHistory', this)">
    <span class="nav-icon">&#128202;</span>
    Voortgang
  </button>
  <button class="nav-item" onclick="showPage('pageProfile', this)">
    <span class="nav-icon">&#9881;</span>
    Profiel
  </button>
</div>

<!-- Firebase SDK (compat mode for broad browser support) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- Chart.js for professional progress charts -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3.0.1/dist/chartjs-plugin-annotation.min.js"></script>

<!-- App Scripts -->
<script src="data.js"></script>
<script src="firebase-sync.js"></script>
<script src="app.js"></script>
<script>
// Register Service Worker for PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(function() {});
}

// PWA Install prompt (Android/Chrome)
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e) {
  e.preventDefault();
  deferredPrompt = e;
  // Toon install banner
  var banner = document.createElement('div');
  banner.id = 'installBanner';
  banner.style.cssText = 'position:fixed;bottom:70px;left:12px;right:12px;background:var(--primary,#1B4F72);color:white;padding:14px 16px;border-radius:12px;display:flex;align-items:center;justify-content:space-between;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:14px';
  banner.innerHTML = '<div><strong>App installeren?</strong><br><span style="font-size:12px;opacity:0.8">Zet de app op je beginscherm</span></div><div style="display:flex;gap:8px"><button onclick="installApp()" style="background:var(--card,white);color:var(--primary,#1B4F72);border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer">Installeren</button><button onclick="dismissInstall()" style="background:none;border:none;color:white;font-size:18px;cursor:pointer;opacity:0.7">&times;</button></div>';
  document.body.appendChild(banner);
});

function installApp() {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(function() { deferredPrompt = null; });
  }
  var b = document.getElementById('installBanner');
  if (b) b.remove();
}

function dismissInstall() {
  var b = document.getElementById('installBanner');
  if (b) b.remove();
}

// iOS install hint (Safari has no install prompt)
if (navigator.standalone === false && /iPhone|iPad/.test(navigator.userAgent)) {
  var shown = localStorage.getItem('lt_iosInstallShown');
  if (!shown) {
    setTimeout(function() {
      var hint = document.createElement('div');
      hint.id = 'iosInstallHint';
      hint.style.cssText = 'position:fixed;bottom:70px;left:12px;right:12px;background:var(--primary,#1B4F72);color:white;padding:14px 16px;border-radius:12px;z-index:9999;box-shadow:0 4px 20px rgba(0,0,0,0.3);font-size:13px;text-align:center;line-height:1.5';
      hint.innerHTML = '<strong>Tip:</strong> Zet deze app op je beginscherm!<br>Tik op <span style="font-size:16px">⎙</span> (deel-icoon) → <strong>Zet op beginscherm</strong><button onclick="this.parentElement.remove();localStorage.setItem(\'lt_iosInstallShown\',\'1\')" style="position:absolute;top:8px;right:12px;background:none;border:none;color:white;font-size:18px;cursor:pointer;opacity:0.7">&times;</button>';
      document.body.appendChild(hint);
      localStorage.setItem('lt_iosInstallShown', '1');
    }, 3000);
  }
}
</script>
</body>
</html>
